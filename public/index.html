<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI File Searcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>AI <span>File Searcher</span></h1>
            <p>曖昧な記憶でPC内検索できるAIファイル検索</p>
        </header>

        <main>
            <div class="search-panel glass-panel">
                <div class="controls">
                    <div class="input-group">
                        <label for="model-select">使用するAIモデル</label>
                        <select id="model-select">
                            <option value="gemini-1.5-flash">Loading models...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="ext-input">拡張子フィルター（複数選択可）</label>
                        <div class="ext-selector-wrapper">
                            <input type="text" id="ext-input" placeholder="クリックして拡張子を選択" readonly>
                            <div id="ext-modal" class="ext-modal hidden">
                                <div class="ext-modal-header">
                                    <span>拡張子を選択</span>
                                    <button type="button" id="ext-close-btn">&times;</button>
                                </div>
                                <div class="ext-modal-body" id="ext-categories">
                                    <!-- JSで動的に生成 -->
                                </div>
                                <div class="ext-modal-footer">
                                    <button type="button" id="ext-clear-btn" class="ext-btn-secondary">クリア</button>
                                    <button type="button" id="ext-apply-btn" class="ext-btn-primary">適用</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <label for="dir-input">検索ディレクトリ</label>
                        <div class="path-input-wrapper">
                            <input type="text" id="dir-input" placeholder="フルパスを入力 (例: C:\Documents)" list="dir-suggestions">
                            <button id="browse-btn" type="button" title="フォルダを選択">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                参照...
                            </button>
                            <datalist id="dir-suggestions"></datalist>
                        </div>
                    </div>
                    <div class="input-group checkbox-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="deep-search-check">
                            <span class="checkmark"></span>
                            内容も精査する (txt, mdなど)
                        </label>
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="例:昨日作ったPythonの設定ファイル">
                    <button id="search-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
                
                <div class="hint">
                    ※ 検索対象: <span id="base-dir-display">User Folder</span><br>
                    ※ 検索結果をクリックすると、そのファイルを直接開くことができます。
                </div>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p id="loading-status">ファイルをスキャン中...</p>
                <p id="scanning-dir-text" class="scanning-dir"></p>
                <button id="cancel-btn" class="ext-btn-secondary" style="margin-top: 15px; color: #fca5a5; border-color: #fca5a5;">中止する</button>
            </div>

            <div id="results-container" class="results-panel hidden">
                <h2>検索結果</h2>
                <div id="results-list"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
